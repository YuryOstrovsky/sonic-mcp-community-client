name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: ESLint
        run: npm run lint
      - name: Build
        run: npm run build

  backend:
    name: Backend sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Syntax + import check
        # The backend has no test suite yet — at minimum verify it
        # imports cleanly on a fresh install.
        run: |
          python -c "import sys; sys.path.insert(0, 'backend'); import main; import nl_router; import llm"

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: sonic-mcp-community-client:ci
      - name: Smoke test
        # Start the container with a fake MCP_BASE_URL. /api/health
        # doesn't reach upstream — if it answers 200 the stack boots.
        run: |
          docker run -d --name client-smoke -p 15174:5174 \
            -e MCP_BASE_URL=http://127.0.0.1:9999 \
            sonic-mcp-community-client:ci
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:15174/api/health > /dev/null; then
              echo "healthy after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:15174/api/health
          docker logs client-smoke | tail -30
          docker stop client-smoke
